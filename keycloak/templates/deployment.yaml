apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "keycloak.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /opt/keycloak/bin/kc.sh
          args:
            - start
            - --http-enabled=true
            - --http-port={{ .Values.ports.http | default 8080 }}
          {{- if .Values.ports.https }}
            - --https-port={{ .Values.ports.https }}
          {{- end }}
          env:
            - name: KC_CACHE
              value: "ispn"
            - name: KC_CACHE_STACK
              value: "kubernetes"
            - name: JAVA_OPTS_APPEND
              value: -Djgroups.dns.query={{ include "keycloak.fullname" . }}-headless
          {{- if .Values.health.enabled }}
            - name: KC_HEALTH_ENABLED
              value: "true"
          {{- end }}
          {{- if .Values.proxy.enabled }}
            - name: KC_PROXY
              value: {{ .Values.proxy.mode }}
          {{- end }}
          {{- if .Values.database }}
          {{- if .Values.database.vendor }}
            - name: KC_DB
              value: {{ .Values.database.vendor }}
          {{- end }}
          {{- if .Values.database.host }}
            - name: KC_DB_URL_HOST
              value: {{ .Values.database.host }}
          {{- end }}
          {{- if .Values.database.port }}
            - name: KC_DB_URL_PORT
              value: {{ .Values.database.port }}
          {{- end }}
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret | default (printf "%s-admin" (include "keycloak.fullname" . ))}}
                  key: {{ .Values.admin.existingSecret | default "user"}}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret | default (printf "%s-admin" (include "keycloak.fullname" . ))}}
                  key: {{ .Values.admin.existingSecret | default "password"}}
          {{- if or (.Values.database.password) (.Values.database.existingSecret) }}
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "keycloak.fullname" . ))}}
                  key: {{ .Values.database.existingSecret | default "user" }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (printf "%s-database" (include "keycloak.fullname" . ))}}
                  key: {{ .Values.database.existingSecretKey | default "password" }}
          {{- end }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- toYaml .Values.extraEnv | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ports.http |default 8080 }}
              protocol: TCP
            {{- if .Values.ports.https }}
            - name: https
              containerPort: {{ .Values.ports.https }}
              protocol: TCP
            {{- end }}
          {{- if .Values.health.enabled }}
          {{- with .Values.health.startupProbe }}
          startupProbe:
          {{- tpl . $ | nindent 12 }}
          {{- end }}
          {{- with .Values.health.livenessProbe }}
          livenessProbe:
          {{- tpl . $ | nindent 12 }}
          {{- end }}
          {{- with .Values.health.readinessProbe }}
          readinessProbe:
          {{- tpl . $ | nindent 12 }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
