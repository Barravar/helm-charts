{{- if and .Values.admin.password (not .Values.admin.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" $ }}-admin
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "keycloak.labels" $ | nindent 4 }}
type: Opaque
data:
  user: {{ .Values.admin.user | default "admin" | b64enc }}
  password: {{ .Values.admin.password | b64enc }}
{{- end }}