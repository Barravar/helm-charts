# Default values for keycloak.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# The internal Kubernetes cluster domain
clusterDomain: "cluster.local"

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
  # key: value

podLabels: {}
  # key: value

podSecurityContext:
  fsGroup: 1000

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Args to be passed to service startup script. Entrypoint command is set to:
# - /opt/keycloak/bin/kc.sh
# - start
args: []
#   - --http-enabled=true
#   - --http-port=8080
#   - --hostname-strict=false
#   - --hostname-strict-https=false

# Keycloak environment variables
env: []
#   - name: KC_HOSTNAME
#     value: keycloak.barravar.com.br


resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

proxy:
  enabled: true
  mode: edge

health:
  enabled: true

  startupProbe: |
    httpGet:
      path: /auth/health
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 1
    failureThreshold: 60
    periodSeconds: 5

  readinessProbe: |
    httpGet:
      path: /auth/health/ready
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 1

  livenessProbe: |
    httpGet:
      path: /auth/health/live
      port: http
    initialDelaySeconds: 0
    timeoutSeconds: 5

extraInitContainers: ""

extraContainers: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

service:
  # Keycloak service configuration
  annotations: {}
  labels: {}
  type: ClusterIP
  httpPort: 80
  httpNodePort: ""
  httpsPort: 8443

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  labels: {}
  hosts:
    - host: keycloak.barravar.com.br
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: keycloak-barravar-tls
  #    hosts:
  #      - keycloak.barravar.com.br

# Secrets to be created
secrets: {}
  # mysecret
  #   type: {}
  #   annotations: {}
  #   labels: {}
  #   stringData: {}
  #   data: {}