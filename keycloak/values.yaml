# Default values for keycloak.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# The internal Kubernetes cluster domain
clusterDomain: "cluster.local"

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
#  key: value

podLabels: {}
#  key: value

podSecurityContext:
  fsGroup: 1000

securityContext:
#  capabilities:
#    drop:
#    - ALL
#  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Extra Keycloak environment variables
# Use ports.http (HTTP_PORT) and ports.https (HTTPS_PORT) to define custom ports
extraEnvs: []
#  - name: KC_HOSTNAME
#    value: "keycloak.barravar.com.br"
#  - name: KEYCLOAK_ADMIN
#    value: "admin"
#  - name: KEYCLOAK_ADMIN_PASSWORD
#    value: "changeme"
#  - name: KC_HTTPS_KEY_STORE_FILE
#    value: "/usr/lib/jvm/jre/lib/security/cacerts"

# Keycloak HTTP and HTTPS ports.
# If not set, default HTTP port is exposed (8080). HTTPS port is only exposed if explicitly set.
ports: {}
#  http: 8080
#  https: 8443

resources: {}
#  limits:
#    cpu: 100m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi

proxy:
  enabled: true
  mode: edge

health:
  enabled: true

  startupProbe: |
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 1
    failureThreshold: 60
    periodSeconds: 5

  readinessProbe: |
    httpGet:
      path: /health/ready
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 1

  livenessProbe: |
    httpGet:
      path: /health/live
      port: http
    initialDelaySeconds: 0
    timeoutSeconds: 5

extraInitContainers: ""

extraContainers: ""

autoscaling:
  enabled: false
#  minReplicas: 1
#  maxReplicas: 100
#  targetCPUUtilizationPercentage: 80
#  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

# Pod affinity/anti-affinity
affinity: ""
# affinity: |
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#       - matchExpressions:
#         - key: topology.kubernetes.io/zone
#           operator: In
#           values:
#           - antarctica-east1
#           - antarctica-west1
#     preferredDuringSchedulingIgnoredDuringExecution:
#     - weight: 1
#       preference:
#         matchExpressions:
#         - key: another-node-label-key
#           operator: In
#           values:
#           - another-node-label-value

service:
  # Keycloak service configuration
  annotations: {}
  labels: {}
  type: ClusterIP
  httpPort: 80
  httpNodePort: ""
  httpsPort: 8443

ingress:
  enabled: false
  className: ""
  annotations: {}
  #  kubernetes.io/ingress.class: nginx
  #  kubernetes.io/tls-acme: "true"
  labels: {}
  rules: []
  #  - host: keycloak.barravar.com.br
  #    paths:
  #      - path: /
  #        pathType: ImplementationSpecific
  tls: []
  #  - secretName: keycloak-barravar-tls
  #    hosts:
  #      - keycloak.barravar.com.br

# Secrets to be created
secrets: {}
#  mysecret:
#    type: {}
#    annotations: {}
#    labels: {}
#    stringData: {}
#    data: {}